
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goodbye Glory - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#05010d;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.login-box{
width:420px;
padding:40px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
border-radius:30px;
box-shadow:0 0 50px rgba(178,108,255,.15);
}

.logo{
font-size:2rem;
font-weight:700;
text-align:center;
margin-bottom:25px;
background:linear-gradient(90deg,#fff,#b26cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,.08);
color:white;
}

input::placeholder{
color:#bbb;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:16px;
font-weight:600;
background:linear-gradient(90deg,#8e44ff,#c76dff);
color:white;
transition:.4s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(178,108,255,.5);
}

.error{
color:#ff6b6b;
text-align:center;
margin-bottom:15px;
}

.info{
margin-top:20px;
text-align:center;
color:#ccc;
line-height:1.8;
font-size:14px;
}

</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="login-box">

<div class="logo">
Goodbye Glory
</div>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="error">
{{ messages[0] }}
</div>
{% endif %}
{% endwith %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<div class="info">
Yash → Admin Dashboard<br>
Lory → Viewer Page
</div>

</div>

<script>

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<250;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
s:Math.random()*1.5
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(star=>{

ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fill();

star.y+=star.s;

if(star.y>canvas.height){

star.y=0;
star.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
